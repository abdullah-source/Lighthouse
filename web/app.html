<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lighthouse — dashboard</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body">
  <nav class="nav">
    <div class="wrap nav-in" style="max-width:1180px">
      <a class="logo" href="/"><span class="mark"></span> Lighthouse</a>
      <div class="nav-cta">
        <button class="btn btn-ghost btn-sm" id="new-audit">New audit</button>
        <a class="btn btn-ghost btn-sm" href="/gtm">GTM Studio</a>
        <a class="btn btn-ghost btn-sm" id="signin-btn" href="#">Sign in</a>
        <span id="user-slot" class="cl-hidden"></span>
      </div>
    </div>
  </nav>

  <main class="main" id="main">
    <!-- CENTERED COMPOSER (the product's front door) -->
    <section class="composer-wrap" id="composer">
      <h1 class="composer-title">Measure your brand in AI search</h1>
      <p class="composer-sub">See whether ChatGPT, Claude, and Perplexity recommend you, who wins instead, and why.</p>

      <form id="audit-form" class="composer">
        <div class="composer-row">
          <input id="f-brand" class="c-brand" type="text" placeholder="Your brand or firm" autocomplete="off" required />
          <span class="c-sep">in</span>
          <input id="f-category" class="c-cat" type="text" placeholder="any category — running shoes, CRM software, immigration law…" autocomplete="off" required />
        </div>
        <textarea id="f-context" class="c-context" rows="2" placeholder="Optional: paste reviews, positioning, or customer language for a deeper, grounded audit…"></textarea>
        <div class="composer-foot">
          <div class="composer-opts">
            <input id="f-competitor" class="c-comp" type="text" placeholder="Compare vs a competitor (optional)" autocomplete="off" />
            <label class="attach" title="Attach a text file (.txt, .md, .csv)">
              <input id="f-file" type="file" accept=".txt,.md,.markdown,.csv,.json" hidden />
              <span class="attach-ic">📎</span> <span id="attach-label">Attach file</span>
            </label>
          </div>
          <button id="run-btn" class="btn btn-primary" type="submit">Run audit</button>
        </div>
      </form>

      <div class="ex-chips" id="cat-examples">
        <span class="ex-chip">running shoes</span>
        <span class="ex-chip">CRM software</span>
        <span class="ex-chip">personal injury lawyers</span>
        <span class="ex-chip">project management tools</span>
      </div>

      <div class="recent" id="recent-wrap">
        <div class="recent-head">Recent audits</div>
        <div class="recent-list" id="recent-list"></div>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="panel" class="panel" hidden></section>
  </main>

  <script src="/auth.js"></script>
  <script src="/app.js"></script>
</body>
</html>
